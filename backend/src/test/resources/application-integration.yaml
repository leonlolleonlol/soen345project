spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  sql:
    init:
      schema-locations: classpath:schema-h2.sql
      mode: always
  flyway:
    enabled: false

notification:
  email:
    provider: logger
    sendgrid:
      api-key: ""
      from-email: ""
  sms:
    provider: logger
    twilio:
      account-sid: ""
      auth-token: ""
      from-phone: ""
